<!doctype html>
<html lang="en" data-theme="paper-dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Pre-paint theme stamp so the first frame doesn't flash the wrong
         theme. Mirrors useApplyTheme's resolution; that hook owns every
         change after boot. Falls back to the attribute above. -->
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('pokergrid:settings:v1'));
        var st = (s && s.state) || {};
        // v1 keys, with the v0 single-choice `theme` as fallback for
        // saves the store hasn't migrated yet.
        var fam = st.themeFamily;
        var app = st.appearance;
        if (!fam && st.theme) {
          // v0 single-choice `theme` the store hasn't migrated yet.
          fam = st.theme === 'paper' ? 'paper' : 'card-room';
          app =
            st.theme === 'card-room-dark'
              ? 'dark'
              : st.theme === 'system'
                ? 'system'
                : 'light';
        }
        if (!fam) {
          // No stored choice at all — the new-player default
          // (mirrors DEFAULT_SETTINGS: Morning Paper, dark).
          fam = 'paper';
          app = 'dark';
        }
        var dark =
          app === 'dark' ||
          (app !== 'light' &&
            matchMedia('(prefers-color-scheme: dark)').matches);
        var theme = (fam === 'paper' ? 'paper' : 'card-room') + (dark ? '-dark' : '');
        document.documentElement.dataset.theme = theme;
        // Browser chrome follows the theme's paper surface from the
        // first frame too (useApplyTheme owns it after boot).
        var surfaces = {
          paper: '#faf7f1',
          'paper-dark': '#17150f',
          'card-room': '#faf8f2',
          'card-room-dark': '#131210',
        };
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta && surfaces[theme]) meta.setAttribute('content', surfaces[theme]);
      } catch (e) {
        /* keep the static fallback */
      }
    </script>
    <!-- Pre-CSS backgrounds so a slow (or failed) stylesheet never
         flashes a white page — each theme's --paper surface, inline. -->
    <style>
      html {
        background: #faf7f1;
      }
      html[data-theme='paper-dark'] {
        background: #17150f;
      }
      html[data-theme='card-room'] {
        background: #faf8f2;
      }
      html[data-theme='card-room-dark'] {
        background: #131210;
      }
    </style>
    <!-- viewport-fit=cover extends the layout under notch/home-indicator
         areas so env(safe-area-inset-*) resolves to real values — the
         dock and sheets pad with it. Without the flag it's always 0. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="PokerGrid — a daily 5×5 poker solitaire puzzle. Place cards, build ten poker hands, beat the target."
    />
    <!-- Static fallback = the paper-dark default; the pre-paint script
         above and useApplyTheme keep it matched to the live theme. -->
    <meta name="theme-color" content="#17150f" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <title>PokerGrid</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Boot watchdog: if the app hasn't mounted shortly after load, a
         stale/poisoned cache is almost certainly serving HTML where JS
         should be (the service worker keeps doing so across refreshes,
         and the React update banner that would fix it can never
         render). Escape hatch: unregister every service worker, purge
         Cache Storage, reload once. Rate-limited so a genuinely broken
         network can't reload-loop; a healthy boot clears the stamp. -->
    <script>
      (function () {
        var KEY = 'pokergrid:boot-recover-at';
        window.setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.childElementCount > 0) {
            // Mounted fine — allow future recoveries.
            try {
              sessionStorage.removeItem(KEY);
            } catch (e) {
              /* storage unavailable */
            }
            return;
          }
          try {
            var last = Number(sessionStorage.getItem(KEY) || 0);
            if (Date.now() - last < 60000) return; // already tried — stay put
            sessionStorage.setItem(KEY, String(Date.now()));
          } catch (e) {
            return; // no storage → can't rate-limit → don't risk a loop
          }
          var work = [];
          if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
            work.push(
              navigator.serviceWorker.getRegistrations().then(function (rs) {
                return Promise.all(
                  rs.map(function (r) {
                    return r.unregister();
                  })
                );
              })
            );
          }
          if (window.caches && window.caches.keys) {
            work.push(
              window.caches.keys().then(function (keys) {
                return Promise.all(
                  keys.map(function (k) {
                    return window.caches.delete(k);
                  })
                );
              })
            );
          }
          var reload = function () {
            window.location.reload();
          };
          Promise.all(work).then(reload, reload);
        }, 6000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
